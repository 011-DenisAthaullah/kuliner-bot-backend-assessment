name: Laravel CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_pgsql, bcmath

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Copy env
        run: cp .env.example .env

      # 🔥 FIX PENTING: override semua config CI
      - name: Set environment variables
        run: |
          echo "APP_ENV=testing" >> .env
          echo "APP_KEY=" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=testing" >> .env
          echo "DB_USERNAME=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env

          # 🔥 IMPORTANT: disable real API calls
          echo "TELEGRAM_BASE_URL=https://api.telegram.org" >> .env
          echo "TELEGRAM_BOT_TOKEN=fake_token" >> .env

      - name: Generate key
        run: php artisan key:generate

      - name: Clear config cache
        run: php artisan config:clear

      - name: Run migration
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --testdox